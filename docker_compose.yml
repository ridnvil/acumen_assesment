services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret12345
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mock-server:
    build:
      context: ./mock-server
    container_name: mock_server_flask
    restart: always
    ports:
      - "6000:5000"
    volumes:
      - ./mock-server:/app

  pipeline-service:
    build:
      context: ./pipeline-service
    env_file:
      - .env
    container_name: pipeline_service_fastapi
    restart: always
    ports:
      - "7000:8000"
    environment:
      DATABASE_URL: postgresql://admin:secret12345@db:5432/customer_db
      MOCK_SERVER_URL: http://mock-server:5000/api/customers
    volumes:
      - ./pipeline-service:/app
    depends_on:
      - db
      - mock-server

volumes:
  postgres_data: